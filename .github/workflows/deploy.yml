name: Build and Deploy to Cityhost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy to Cityhost
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Static Site
        run: npm run build

      - name: Sync via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Ensure it deploys to the correct public directory on Cityhost
          # Usually it's public_html or www or the domain name folder. 
          # You might need to change this depending on your Cityhost configuration.
          server-dir: ./www/design-center.com.ua/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
