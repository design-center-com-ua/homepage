backend:
  name: git-gateway
  site_domain: "mellow-chimera-825f2d.netlify.app"
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/data/projects" # Media files will be stored in the repo under public/data/projects
public_folder: "/data/projects" # The src attribute for uploaded media will begin with /data/projects

collections:
  - name: "crm_projects"
    label: "CRM: Projects"
    files:
      - label: "Projects List"
        name: "projects"
        file: "public/data/projects.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            fields:
              - {label: "ID (URL slug)", name: "id", widget: "string"}
              - {label: "Name (Ukrainian)", name: "name_uk", widget: "string"}
              - {label: "Name (English)", name: "name_en", widget: "string"}
              - {label: "Category ID (e.g., facades, interior)", name: "category", widget: "string"}
              - {label: "Category Label (Ukrainian)", name: "categoryLabel_uk", widget: "string"}
              - {label: "Category Label (English)", name: "categoryLabel_en", widget: "string"}
              - {label: "Location (Ukrainian)", name: "location_uk", widget: "string"}
              - {label: "Location (English)", name: "location_en", widget: "string"}
              - {label: "Description (Ukrainian)", name: "description_uk", widget: "text"}
              - {label: "Description (English)", name: "description_en", widget: "text"}
              - {label: "Project Image", name: "imageUrl", widget: "image"}

  - name: "crm_clients"
    label: "CRM: Partners"
    files:
      - label: "Partners List"
        name: "clients"
        file: "public/data/clients.json"
        media_folder: "/public/clients"
        public_folder: "/clients"
        fields:
          - label: "Clients"
            name: "items"
            widget: "list"
            fields:
              - {label: "ID (URL slug)", name: "id", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Client Logo", name: "imageUrl", widget: "image"}
