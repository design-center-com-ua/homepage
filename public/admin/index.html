<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal</title>
    <style>
      .cms-lang-switch {
        position: fixed;
        bottom: 14px;
        left: 14px;
        z-index: 2147483647;
        background: #1d1d1d;
        border-radius: 999px;
        padding: 6px 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 4px 14px rgba(0,0,0,.25);
      }
      .cms-lang-switch button {
        background: none;
        border: none;
        cursor: pointer;
        color: #8d8d8d;
        font: inherit;
        padding: 0;
      }
      .cms-lang-switch button.active { color: #b6ce01; }

      /* Client guide */
      .cms-help-btn {
        position: fixed;
        bottom: 14px;
        right: 14px;
        z-index: 2147483647;
        background: #b6ce01;
        color: #1d1d1d;
        border: none;
        cursor: pointer;
        border-radius: 999px;
        padding: 8px 18px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        box-shadow: 0 4px 14px rgba(0,0,0,.25);
      }
      .cms-help-btn:hover { background: #a4ba00; }
      .cms-help-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        background: rgba(0,0,0,.55);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .cms-help-card {
        background: #fff;
        color: #1d1d1d;
        max-width: 560px;
        width: 100%;
        max-height: 85vh;
        overflow-y: auto;
        border-radius: 10px;
        padding: 32px 34px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.55;
        position: relative;
        box-shadow: 0 20px 60px rgba(0,0,0,.4);
      }
      .cms-help-card h2 { font-size: 20px; margin: 0 0 12px; }
      .cms-help-card h3 { font-size: 15px; margin: 22px 0 6px; }
      .cms-help-card p { margin: 0 0 10px; font-size: 14px; color: #333; }
      .cms-help-card ol { margin: 0 0 10px; padding-left: 20px; }
      .cms-help-card li { margin-bottom: 8px; font-size: 14px; }
      .cms-help-intro { font-weight: 600; color: #1d1d1d !important; }
      .cms-help-note { font-size: 12px; color: #888 !important; margin-top: 18px; }
      .cms-help-close {
        position: absolute;
        top: 12px;
        right: 16px;
        border: none;
        background: none;
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        color: #999;
      }
      .cms-help-close:hover { color: #1d1d1d; }
    </style>
  </head>
  <body>
    <!-- Must be set before decap-cms.js loads -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Netlify identity widget (configured for external host) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.init({
          APIUrl: "https://mellow-chimera-825f2d.netlify.app/.netlify/identity"
        });
      }
    </script>

    <script>
      // ---- Bilingual admin: UI locale + all labels follow the chosen language ----
      var cmsLang = localStorage.getItem("cms_lang") === "en" ? "en" : "uk";

      var STRINGS = {
        uk: {
          projectsLabel: "CRM: Проєкти",
          projectsFile: "Список проєктів",
          projectsList: "Проєкти",
          id: "ID (частина адреси, латиницею, напр. dzvinok)",
          nameUk: "Назва (українською)",
          nameEn: "Назва (англійською)",
          category: "ID категорії (напр. facades, interior)",
          categoryUk: "Назва категорії (українською)",
          categoryEn: "Назва категорії (англійською)",
          locationUk: "Локація (українською)",
          locationEn: "Локація (англійською)",
          descUk: "Опис (українською)",
          descEn: "Опис (англійською)",
          image: "Зображення проєкту",
          partnersLabel: "CRM: Партнери",
          partnersFile: "Список партнерів",
          partnersList: "Партнери",
          partnerName: "Назва партнера",
          partnerLogo: "Логотип партнера"
        },
        en: {
          projectsLabel: "CRM: Projects",
          projectsFile: "Projects List",
          projectsList: "Projects",
          id: "ID (URL slug, e.g. dzvinok)",
          nameUk: "Name (Ukrainian)",
          nameEn: "Name (English)",
          category: "Category ID (e.g. facades, interior)",
          categoryUk: "Category Label (Ukrainian)",
          categoryEn: "Category Label (English)",
          locationUk: "Location (Ukrainian)",
          locationEn: "Location (English)",
          descUk: "Description (Ukrainian)",
          descEn: "Description (English)",
          image: "Project Image",
          partnersLabel: "CRM: Partners",
          partnersFile: "Partners List",
          partnersList: "Partners",
          partnerName: "Partner Name",
          partnerLogo: "Partner Logo"
        }
      };

      var t = STRINGS[cmsLang];

      var config = {
        locale: cmsLang,
        load_config_file: false,
        backend: {
          name: "git-gateway",
          site_domain: "mellow-chimera-825f2d.netlify.app",
          identity_url: "https://mellow-chimera-825f2d.netlify.app/.netlify/identity",
          gateway_url: "https://mellow-chimera-825f2d.netlify.app/.netlify/git",
          branch: "main"
        },
        media_folder: "public/data/projects",
        public_folder: "/data/projects",
        collections: [
          {
            name: "crm_projects",
            label: t.projectsLabel,
            files: [
              {
                label: t.projectsFile,
                name: "projects",
                file: "public/data/projects.json",
                fields: [
                  {
                    label: t.projectsList,
                    name: "items",
                    widget: "list",
                    fields: [
                      { label: t.id, name: "id", widget: "string" },
                      { label: t.nameUk, name: "name_uk", widget: "string" },
                      { label: t.nameEn, name: "name_en", widget: "string" },
                      { label: t.category, name: "category", widget: "string" },
                      { label: t.categoryUk, name: "categoryLabel_uk", widget: "string" },
                      { label: t.categoryEn, name: "categoryLabel_en", widget: "string" },
                      { label: t.locationUk, name: "location_uk", widget: "string" },
                      { label: t.locationEn, name: "location_en", widget: "string" },
                      { label: t.descUk, name: "description_uk", widget: "text" },
                      { label: t.descEn, name: "description_en", widget: "text" },
                      { label: t.image, name: "imageUrl", widget: "image" }
                    ]
                  }
                ]
              }
            ]
          },
          {
            name: "crm_clients",
            label: t.partnersLabel,
            files: [
              {
                label: t.partnersFile,
                name: "clients",
                file: "public/data/clients.json",
                media_folder: "public/clients",
                public_folder: "/clients",
                fields: [
                  {
                    label: t.partnersList,
                    name: "items",
                    widget: "list",
                    fields: [
                      { label: t.id, name: "id", widget: "string" },
                      { label: t.partnerName, name: "name", widget: "string" },
                      { label: t.partnerLogo, name: "imageUrl", widget: "image" }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      };

      // Local preview without authentication: open /admin/?backend=test
      if (new URLSearchParams(window.location.search).get("backend") === "test") {
        config.backend = { name: "test-repo" };
      }

      window.CMS.init({ config: config });

      // ---- Floating language toggle ----
      var bar = document.createElement("div");
      bar.className = "cms-lang-switch";
      ["uk", "en"].forEach(function (lang, i) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = lang === "uk" ? "УКР" : "EN";
        if (lang === cmsLang) btn.className = "active";
        btn.addEventListener("click", function () {
          if (lang !== cmsLang) {
            localStorage.setItem("cms_lang", lang);
            window.location.reload();
          }
        });
        bar.appendChild(btn);
        if (i === 0) {
          var sep = document.createElement("span");
          sep.textContent = "|";
          sep.style.color = "#555";
          bar.appendChild(sep);
        }
      });
      document.body.appendChild(bar);

      // ---- Client guide (how-to), mirrors the README client section ----
      var HELP = {
        uk: {
          button: "Довідка",
          close: "Закрити",
          title: "Як редагувати сайт",
          intro: "Вам не потрібні знання коду — увесь вміст сайту редагується тут, у панелі «Internal».",
          steps: [
            "Ліворуч оберіть «CRM: Проєкти» (роботи в галереї) або «CRM: Партнери» (логотипи партнерів).",
            "Натисніть на «Список …», щоб відкрити наявні записи.",
            "Редагуйте тексти або завантажуйте нові зображення. Заповнюйте поля і українською, і англійською — сайт двомовний.",
            "Щоб додати новий елемент, натисніть кнопку «Add …» внизу списку.",
            "Коли завершите — натисніть зелену кнопку «Publish» (Опублікувати) угорі."
          ],
          waitTitle: "Скільки чекати оновлення?",
          wait: "Після натискання «Publish» зміни зберігаються у GitHub, і сайт автоматично пересобирається. Зачекайте 60–90 секунд, потім оновіть сторінку сайту — і ви побачите зміни.",
          accessTitle: "Доступ і паролі",
          access: "Вхід захищено службою Netlify Identity. Щоб змінити пароль, додати нового користувача або забрати доступ — увійдіть у панель на Netlify.com, оберіть сайт і керуйте користувачами у вкладці «Identity».",
          langNote: "Мову цієї панелі можна змінити кнопкою УКР | EN у лівому нижньому кутку."
        },
        en: {
          button: "Guide",
          close: "Close",
          title: "How to edit the website",
          intro: "You do not need to know any code — all site content is edited here, in the Internal panel.",
          steps: [
            "On the left, choose “CRM: Projects” (work gallery items) or “CRM: Partners” (partner logos).",
            "Click the “… List” to open the existing entries.",
            "Edit text or upload new images. Fill in both the Ukrainian and English fields — the site is bilingual.",
            "To add a new item, click the “Add …” button at the bottom of the list.",
            "When you are done, click the green “Publish” button at the top."
          ],
          waitTitle: "How long until it updates?",
          wait: "After you click “Publish”, the changes are saved to GitHub and the site rebuilds automatically. Wait about 60–90 seconds, then refresh your live website to see the changes.",
          accessTitle: "Access & passwords",
          access: "Login is protected by Netlify Identity. To change your password, add a new user, or revoke access, log into your Netlify.com dashboard, select the site, and manage users in the “Identity” tab.",
          langNote: "You can change this panel's language with the УКР | EN button in the bottom-left corner."
        }
      };

      var h = HELP[cmsLang];

      var helpBtn = document.createElement("button");
      helpBtn.type = "button";
      helpBtn.className = "cms-help-btn";
      helpBtn.textContent = h.button;

      var overlay = document.createElement("div");
      overlay.className = "cms-help-overlay";
      var stepsHtml = h.steps.map(function (s) { return "<li>" + s + "</li>"; }).join("");
      overlay.innerHTML =
        '<div class="cms-help-card" role="dialog" aria-modal="true">'
        + '<button class="cms-help-close" aria-label="' + h.close + '">×</button>'
        + '<h2>' + h.title + '</h2>'
        + '<p class="cms-help-intro">' + h.intro + '</p>'
        + '<ol>' + stepsHtml + '</ol>'
        + '<h3>' + h.waitTitle + '</h3><p>' + h.wait + '</p>'
        + '<h3>' + h.accessTitle + '</h3><p>' + h.access + '</p>'
        + '<p class="cms-help-note">' + h.langNote + '</p>'
        + '</div>';

      function openHelp() { overlay.style.display = "flex"; }
      function closeHelp() { overlay.style.display = "none"; }
      helpBtn.addEventListener("click", openHelp);
      overlay.addEventListener("click", function (e) { if (e.target === overlay) closeHelp(); });
      overlay.querySelector(".cms-help-close").addEventListener("click", closeHelp);
      document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeHelp(); });

      document.body.appendChild(helpBtn);
      document.body.appendChild(overlay);
    </script>
  </body>
</html>
